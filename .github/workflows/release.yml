name: Release bridge binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: bridge/go.sum
      - name: Cross-compile
        run: |
          mkdir -p ../dist
          build() {
            GOOS=$1 GOARCH=$2 CGO_ENABLED=0 \
              go build -trimpath -ldflags '-s -w' -o "../dist/$3" .
          }
          build linux arm64 nexus-bridge-linux-arm64
          build linux amd64 nexus-bridge-linux-amd64
          build darwin arm64 nexus-bridge-darwin-arm64
          build windows amd64 nexus-bridge-windows-amd64.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
